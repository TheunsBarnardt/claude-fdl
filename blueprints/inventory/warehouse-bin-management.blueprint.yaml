    project: "ERP system"
    tech_stack: "Python/Frappe Framework"
    files_traced: 18
    entry_points:
      - "erpnext/stock/doctype/warehouse/warehouse.py"
      - "erpnext/stock/doctype/bin/bin.py"
      - "erpnext/stock/doctype/putaway_rule/putaway_rule.py"
      - "erpnext/stock/utils.py"

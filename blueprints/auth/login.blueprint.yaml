# ============================================================
# LOGIN — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Sign in to a SaaS web application with email and password.
# Security-first: constant-time comparison, account lockout,
# rate limiting, and enumeration prevention are all mandatory.
# ============================================================

feature: login
version: "1.0.0"
description: Authenticate a user with email and password
category: auth
tags: [authentication, session, security, identity, saas]

# ─── FIELDS ───────────────────────────────────────────────

fields:
  - name: email
    type: email
    required: true
    label: "Email Address"
    placeholder: "you@example.com"
    sensitive: false
    validation:
      - type: required
        message: "Email is required"
      - type: email
        message: "Please enter a valid email address"
      - type: maxLength
        value: 255
        message: "Email is too long"

  - name: password
    type: password
    required: true
    label: "Password"
    sensitive: true
    validation:
      - type: required
        message: "Password is required"
      - type: minLength
        value: 8
        message: "Password must be at least 8 characters"
      - type: maxLength
        value: 64
        # OWASP: bcrypt has a 72-byte limit. Cap at 64 to prevent
        # silent truncation and DoS via extremely long passwords.
        message: "Password must be less than 64 characters"

  - name: remember_me
    type: boolean
    required: false
    label: "Remember me"
    default: false

# ─── RULES ────────────────────────────────────────────────

rules:
  security:
    max_attempts: 5
    lockout_duration_minutes: 15
    lockout_scope: per_email
    # per_email locks only that account (least disruptive)

    rate_limit:
      window_seconds: 60
      max_requests: 10
      scope: per_ip
      # 10 login attempts per minute per IP

    password_comparison:
      constant_time: true
      # MANDATORY: use bcrypt.compare() or equivalent
      # Never use == or === for password comparison

    credential_error_handling:
      generic_message: true
      # CRITICAL: always return "Invalid email or password"
      # NEVER return "User not found" vs "Wrong password"

  session:
    type: jwt
    access_token:
      expiry_minutes: 15
    refresh_token:
      expiry_days: 7
      rotate_on_use: true
    remember_me_expiry_days: 30
    extend_on_activity: true
    secure_flags:
      http_only: true
      secure: true
      same_site: strict

  email:
    require_verified: true
    case_sensitive: false
    trim_whitespace: true

# ─── OUTCOMES ─────────────────────────────────────────────
# What must be true in each scenario — AI decides how to implement

outcomes:
  successful_login:
    given:
      - field: email
        operator: matches
        value: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
        description: "Email is valid format"
      - field: email
        operator: exists
        description: "User exists in database (after lowercase + trim normalization)"
      - field: failed_login_attempts
        operator: lt
        value: 5
        description: "Account is not locked (or lockout has expired)"
      - field: status
        operator: neq
        value: disabled
        description: "Account is active"
      - field: password
        operator: eq
        value: stored_hash
        description: "Password matches stored hash (constant-time comparison via bcrypt)"
      - field: email_verified
        operator: eq
        value: true
        description: "Email is verified (when rules.email.require_verified is true)"
    then:
      - failed attempt counter is reset to 0
      - access token is created (JWT, 15-min expiry)
      - refresh token is created (7-day expiry, or 30-day if remember_me)
      - refresh token rotates on each use
      - tokens are set as cookies (httpOnly, secure, sameSite strict)
      - login.success event is emitted with user_id, email, timestamp, ip, user_agent, session_id
    result: redirect to /dashboard

  invalid_credentials:
    given:
      - field: user
        operator: not_exists
        description: "User not found in database"
      # OR
      - field: password
        operator: neq
        value: stored_hash
        description: "Password does not match"
    then:
      - failed attempt counter is incremented
      - field: failed_login_attempts
        operator: gte
        value: 5
        description: "If attempts reach 5, account is locked for 15 minutes"
      - login.failed event is emitted
      - if newly locked, login.locked event is emitted
    result: show "Invalid email or password" (SAME message for both cases — enumeration prevention)

  account_locked:
    given:
      - field: failed_login_attempts
        operator: gte
        value: 5
        description: "Max attempts exceeded"
      - field: locked_until
        operator: gt
        value: now
        description: "Lockout period has not expired"
    then:
      - login.locked event is emitted
    result: show "Account temporarily locked. Please try again later."

  email_not_verified:
    given:
      - field: email_verified
        operator: eq
        value: false
        description: "User exists, password correct, but email not verified"
    then:
      - login.unverified event is emitted
    result: redirect to email-verification with message "Please verify your email before logging in"

  account_disabled:
    given:
      - field: status
        operator: eq
        value: disabled
        description: "Account deactivated by admin or user"
    result: show "This account has been disabled. Please contact support."

  rate_limited:
    given:
      - field: request_count
        operator: gt
        value: 10
        description: "More than 10 requests in 60 seconds from this IP"
    result: show "Too many login attempts. Please wait a moment."

# ─── ERRORS ───────────────────────────────────────────────

errors:
  - code: LOGIN_INVALID_CREDENTIALS
    status: 401
    message: "Invalid email or password"
    retry: true

  - code: LOGIN_ACCOUNT_LOCKED
    status: 423
    message: "Account temporarily locked. Please try again later."
    retry: false

  - code: LOGIN_EMAIL_NOT_VERIFIED
    status: 403
    message: "Please verify your email address to continue"
    retry: false
    redirect: email-verification

  - code: LOGIN_ACCOUNT_DISABLED
    status: 403
    message: "This account has been disabled. Please contact support."
    retry: false

  - code: LOGIN_RATE_LIMITED
    status: 429
    message: "Too many login attempts. Please wait a moment."
    retry: true

  - code: LOGIN_VALIDATION_ERROR
    status: 422
    message: "Please check your input and try again"
    retry: true

# ─── EVENTS ───────────────────────────────────────────────

events:
  - name: login.success
    description: "User successfully authenticated"
    payload: [user_id, email, timestamp, ip_address, user_agent, session_id]

  - name: login.failed
    description: "Authentication attempt failed"
    payload: [email, timestamp, ip_address, user_agent, attempt_count, reason]

  - name: login.locked
    description: "Account locked due to too many failures"
    payload: [email, user_id, timestamp, lockout_until, attempt_count]

  - name: login.unverified
    description: "Login blocked — email not verified"
    payload: [user_id, email, timestamp]

# ─── RELATIONSHIPS ────────────────────────────────────────

related:
  - feature: signup
    type: required
    reason: "User must exist before they can log in"
    ui_link: "Don't have an account? Sign up"
    ui_link_position: below_form

  - feature: password-reset
    type: recommended
    reason: "Users will forget passwords"
    ui_link: "Forgot password?"
    ui_link_position: below_password_field

  - feature: email-verification
    type: recommended
    reason: "Required when rules.email.require_verified is true"

  - feature: logout
    type: required
    reason: "Every login needs a logout"

# ─── UI HINTS ─────────────────────────────────────────────

ui_hints:
  layout: single_column_centered
  max_width: 420px
  show_logo: true
  fields_order: [email, password, remember_me]

  actions:
    primary:
      label: "Sign in"
      type: submit
      full_width: true

  links:
    - label: "Forgot password?"
      target: password-reset
      position: below_password_field
    - label: "Don't have an account? Sign up"
      target: signup
      position: below_form

  accessibility:
    autofocus: email
    autocomplete:
      email: username
      password: current-password
    aria_live_region: true

  loading:
    disable_button: true
    show_spinner: true
    prevent_double_submit: true

# ─── EXTENSIONS ───────────────────────────────────────────

extensions:
  nextjs:
    route: "/login"
    layout: "(auth)"
    server_action: true
    middleware_redirect: "/dashboard"

  express:
    route: "/api/auth/login"
    middleware: ["rate-limit", "cors"]

  laravel:
    guard: "web"
    middleware: ["guest"]
    throttle: "5,1"

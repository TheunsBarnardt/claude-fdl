title: Feature Definition Language (FDL)
description: >-
  Framework-agnostic YAML blueprints for software features.
  Define once, generate for any language and framework.
  45 production-ready blueprints for auth, payments, workflows, CMS, ERP, and more.

url: https://theunsbarnardt.github.io
baseurl: /claude-fdl

remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Site metadata for SEO
author: Theuns Barnardt
twitter:
  card: summary
social:
  name: Feature Definition Language
  links:
    - https://github.com/TheunsBarnardt/claude-fdl

# Open Graph defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-default.png
      lang: en
  - scope:
      path: "blueprints"
    values:
      layout: default
      grand_parent: Blueprint Catalog

# Search
search_enabled: true
search.heading_level: 3

# Navigation links (top-right)
aux_links:
  GitHub: https://github.com/TheunsBarnardt/claude-fdl
  API Registry: /claude-fdl/api/registry.json

aux_links_new_tab: true

# Footer
footer_content: >-
  Feature Definition Language (FDL) is open source under the
  <a href="https://github.com/TheunsBarnardt/claude-fdl/blob/master/LICENSE">MIT License</a>.

# Ensure Jekyll serves static API files
include:
  - api

# Prevent Jekyll from clearing generated files
keep_files:
  - api
  - blueprints

# Clean URLs
permalink: pretty

# Color scheme — "light" or "dark"
color_scheme: dark

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"
